<!-- 1) Füge in deinem <style>-Block diese Klassen hinzu (z. B. unterhalb .row-closed …): -->
.status-banner{display:none;margin-bottom:16px;border-left:6px solid var(--gold)}
.status-banner.warn{border-left-color:var(--gold)}
.status-banner.error{border-left-color:var(--error)}
.status-banner.ok{border-left-color:var(--success)}
.status-banner .bd{white-space:pre-wrap}

<!-- 2) Füge in <main> VOR dem KPI-Grid folgendes Element ein: -->
<div id="statusBanner" class="card status-banner warn">
  <div class="hd" id="statusBannerTitle">Hinweis</div>
  <div class="bd" id="statusBannerText"></div>
</div>

<!-- 3) Ersetze deinen kompletten <script>...</script> Block durch diesen Script-Inhalt: -->
<script>
let historyChart;
const labels = {diesel:"Diesel", e5:"Super E5", e10:"Super E10", hvo:"HVO Diesel"};
const colors = {diesel:"#c62828", e5:"#2e7d32", e10:"#1565c0", hvo:"#d19900"};

function euro(v){ return (v || v===0) ? `€ ${Number(v).toFixed(3)}` : "–"; }
function ts(v){ if(!v) return "–"; const d=new Date(v); return d.toLocaleString('de-DE'); }

function showBanner(level, title, message){
  const banner = document.getElementById('statusBanner');
  const h = document.getElementById('statusBannerTitle');
  const t = document.getElementById('statusBannerText');
  if(!banner || !h || !t) return;
  banner.classList.remove('warn','error','ok');
  banner.classList.add(level);
  h.textContent = title || 'Hinweis';
  t.textContent = message || '';
  banner.style.display = 'block';
}
function hideBanner(){
  const banner = document.getElementById('statusBanner');
  if(!banner) return;
  banner.style.display = 'none';
}

function switchTab(id, btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='history') loadHistory();
  if(id==='ch24') loadChanges(24);
  if(id==='ch48') loadChanges(48);
}

async function j(path, timeoutMs = 15000){
  // Cachebuster + no-store: verhindert veraltete JSONs aus Zwischen-Caches
  const url = path + '?v=' + Date.now();
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, { cache: 'no-store', signal: ctrl.signal });
    if(!r.ok){
      const err = new Error(`HTTP ${r.status} ${r.statusText}`);
      err.status = r.status;
      err.url = path;
      throw err;
    }
    return await r.json();
  } finally {
    clearTimeout(t);
  }
}

function unwrapAverages(avg){ return avg?.averages || avg || {}; }
function unwrapStations(prices){ return prices?.stations || prices || []; }
function unwrapHistory(data){ return data?.data || data || []; }
function unwrapLastFetch(status){
  // status.json kann je nach Version last_fetch / last_success enthalten
  return status?.last_fetch?.timestamp || status?.last_fetch || status?.last_success || null;
}
function rowTime(r){ return r.timestamp || r.last_update || null; }
function newestRowTime(rows){
  const vals = rows.map(r => rowTime(r)).filter(Boolean).map(v => new Date(v).getTime()).filter(v => !Number.isNaN(v));
  if (!vals.length) return null;
  return new Date(Math.max(...vals)).toISOString();
}

function hvoInfo(r){
  if (r.hvo != null) return '<div class="muted">HVO-Preis extern ergänzt</div>';
  if (r.hvo_available) return `<div class="muted">${r.hvo_note || 'HVO verfügbar'}</div>`;
  return '';
}
function openInfo(r){
  if (r.open_label) return `<div class="muted">${r.open_label}</div>`;
  if (r.is_open === true) return '<div class="muted">Status: geöffnet</div>';
  if (r.is_open === false) return '<div class="muted" style="color:#b45309">Status: aktuell geschlossen</div>';
  return '<div class="muted">Status: unbekannt</div>';
}

function renderBestTimes(data){
  const el = document.getElementById('bestTimeGrid');
  if (!el) return;
  const lbl = {diesel:'Diesel', e5:'Super E5', e10:'Super E10', hvo:'HVO'};
  el.innerHTML = ['diesel','e5','e10','hvo'].map(k => {
    const r = data?.[k] || {};
    const desc = (r.enough_data && r.best_slot)
      ? `Meist günstig: ${r.best_slot} Uhr`
      : 'Noch nicht genug historische Daten';
    const sub = (r.enough_data && r.best_price != null)
      ? `Ø ${euro(r.best_price)} · ${r.samples} Stichproben`
      : 'Auswertung auf Basis der letzten 30 Tage';
    return `<div class="kpi"><div class="muted">${lbl[k]}</div><div class="val" style="font-size:20px;line-height:1.3">${desc}</div><div class="muted" style="font-size:13px">${sub}</div></div>`;
  }).join('');
}

function minPrice(rows, fuel){
  const vals = rows.map(r => r?.[fuel]).filter(v => typeof v === 'number' && !Number.isNaN(v));
  return vals.length ? Math.min(...vals) : null;
}

async function loadOverview(){
  hideBanner();

  const results = await Promise.allSettled([
    j('./data/averages.json'),
    j('./data/stations_prices.json'),
    j('./data/status.json'),
    j('./data/best_times_30d.json'),
  ]);

  const avgRes = results[0];
  const pricesRes = results[1];
  const statusRes = results[2];
  const bestRes = results[3];

  const avg = (avgRes.status==='fulfilled') ? avgRes.value : null;
  const prices = (pricesRes.status==='fulfilled') ? pricesRes.value : null;
  const status = (statusRes.status==='fulfilled') ? statusRes.value : null;
  const bestTimes = (bestRes.status==='fulfilled') ? bestRes.value : {};

  // 1) Statusbanner (wenn Backend-Job Fehler meldet)
  if(status && status.ok === false){
    const lastAttempt = status.last_attempt ? ts(status.last_attempt) : '–';
    const lastSuccess = status.last_success ? ts(status.last_success) : (unwrapLastFetch(status) ? ts(unwrapLastFetch(status)) : '–');
    const msg = [
      `Letzter Versuch: ${lastAttempt}`,
      `Letzter erfolgreicher Fetch: ${lastSuccess}`,
      `Fehler: ${status.error || 'unbekannt'}`,
    ].join('\n');
    showBanner('error', '⚠️ Daten konnten nicht aktualisiert werden', msg);
  } else {
    // 2) Teilweise fehlende Dateien sichtbarer machen (statt "alles weg")
    const missing = [];
    if(avgRes.status==='rejected') missing.push(`averages.json: ${avgRes.reason?.message || avgRes.reason}`);
    if(pricesRes.status==='rejected') missing.push(`stations_prices.json: ${pricesRes.reason?.message || pricesRes.reason}`);
    if(statusRes.status==='rejected') missing.push(`status.json: ${statusRes.reason?.message || statusRes.reason}`);
    if(bestRes.status==='rejected') missing.push(`best_times_30d.json: ${bestRes.reason?.message || bestRes.reason}`);
    if(missing.length){
      showBanner('warn', '⚠️ Teilweise fehlende Daten-Dateien', missing.join('\n'));
    }
  }

  const a = unwrapAverages(avg);
  const rows = unwrapStations(prices);

  // KPIs
  document.getElementById('kpis').innerHTML = ['diesel','e5','e10','hvo']
    .map(f => `<div class="card"><div class="bd"><div class="muted">${labels[f]} Ø</div><div class="kpi mono">${euro(a?.[f])}</div></div></div>`)
    .join('');

  // Best Times (optional)
  renderBestTimes(bestTimes || {});

  // Timestamp
  const headerTime = newestRowTime(rows) || unwrapLastFetch(status);
  document.getElementById('lastUpdate').textContent = `Stand: ${headerTime ? ts(headerTime) : '–'}`;

  // Tabelle
  if(!rows || !rows.length){
    document.getElementById('stationRows').innerHTML = `<tr><td colspan="7" class="muted">Noch keine Daten vorhanden. Prüfe <span class="mono">/data/status.json</span> und die Actions-Logs.</td></tr>`;
    return;
  }

  const openRows = rows.filter(r => r.is_open !== false);
  const mins = {
    diesel: minPrice(openRows, 'diesel'),
    e5: minPrice(openRows, 'e5'),
    e10: minPrice(openRows, 'e10'),
    hvo: minPrice(openRows, 'hvo'),
  };

  const bestStationIds = new Set(openRows
    .filter(r =>
      (mins.diesel!=null && r.diesel===mins.diesel) ||
      (mins.e5!=null && r.e5===mins.e5) ||
      (mins.e10!=null && r.e10===mins.e10) ||
      (mins.hvo!=null && r.hvo===mins.hvo)
    )
    .map(r => r.id)
  );

  const mode = document.getElementById('sortSel')?.value || 'distance';
  let sorted = [...rows];

  if(mode === 'price'){
    sorted.sort((a,b) => {
      const aClosed = a.is_open === false;
      const bClosed = b.is_open === false;
      if (aClosed !== bClosed) return aClosed ? 1 : -1;
      const aVals = [a.diesel, a.e5, a.e10, a.hvo].filter(v => typeof v === 'number');
      const bVals = [b.diesel, b.e5, b.e10, b.hvo].filter(v => typeof v === 'number');
      const av = aVals.length ? Math.min(...aVals) : Number.POSITIVE_INFINITY;
      const bv = bVals.length ? Math.min(...bVals) : Number.POSITIVE_INFINITY;
      if (av !== bv) return av - bv;
      return (a.distance_km ?? 9999) - (b.distance_km ?? 9999);
    });
  } else {
    sorted.sort((a,b) => {
      const aClosed = a.is_open === false;
      const bClosed = b.is_open === false;
      if (aClosed !== bClosed) return aClosed ? 1 : -1;
      return (a.distance_km ?? 9999) - (b.distance_km ?? 9999);
    });
  }

  function priceCell(val, isBest, closed){
    if (closed) return `<span class="mono muted">–</span>`;
    return `<span class="mono ${isBest ? 'best' : ''}">${euro(val)}</span>`;
  }
  function stationNameCell(r){
    const cls = bestStationIds.has(r.id) ? 'station-best' : '';
    return `<strong class="${cls}">${r.brand || r.name || 'Tankstelle'}</strong>`;
  }
  function stationAddress(r){
    const parts = [];
    const street = [r.street, r.houseNumber].filter(Boolean).join(' ').trim();
    const city = [r.postCode || r.postcode, r.place].filter(Boolean).join(' ').trim();
    if (street) parts.push(street);
    if (city) parts.push(city);
    return parts.join(', ') || (r.name || '');
  }

  document.getElementById('stationRows').innerHTML = sorted.map(r => {
    const closed = r.is_open === false;
    const rowClass = closed ? ' class="row-closed"' : '';
    return `<tr${rowClass}>
      <td>${stationNameCell(r)}<br><span class="muted">${stationAddress(r)}</span>${openInfo(r)}${hvoInfo(r)}</td>
      <td>${r.distance_km} km</td>
      <td>${priceCell(r.diesel, mins.diesel!=null && r.diesel===mins.diesel, closed)}</td>
      <td>${priceCell(r.e5, mins.e5!=null && r.e5===mins.e5, closed)}</td>
      <td>${priceCell(r.e10, mins.e10!=null && r.e10===mins.e10, closed)}</td>
      <td>${priceCell(r.hvo, mins.hvo!=null && r.hvo===mins.hvo, closed)}</td>
      <td class="muted">${ts(rowTime(r))}</td>
    </tr>`;
  }).join('');
}

async function loadHistory(){
  const fuel = document.getElementById('fuelSel').value;
  const days = document.getElementById('daysSel').value;
  const ctx = document.getElementById('historyChart');
  const hint = document.getElementById('historyHint');

  if(historyChart) historyChart.destroy();

  try {
    const data = await j(`./data/history_${fuel}_${days}.json`);
    const rows = unwrapHistory(data);
    if(!rows.length){
      hint.style.display='block';
      hint.textContent='Noch keine echten historischen Daten vorhanden. Der Verlauf baut sich automatisch auf, sobald mehrere Messpunkte gesammelt wurden.';
      return;
    }
    hint.style.display='none';
    historyChart = new Chart(ctx,{
      type:'line',
      data:{
        labels:rows.map(r=>r.day),
        datasets:[{label:labels[fuel],data:rows.map(r=>r.avg_price),borderColor:colors[fuel],backgroundColor:colors[fuel]+'22',fill:true,tension:.3}]
      },
      options:{responsive:true,plugins:{legend:{display:true}},scales:{y:{ticks:{callback:(v)=>'€ '+Number(v).toFixed(3)}}}}
    });
  } catch(e){
    hint.style.display='block';
    hint.textContent = `Verlaufdatei konnte nicht geladen werden (${e.status || 'Fehler'}). Warte auf nächsten erfolgreichen Datenlauf.`;
  }
}

async function loadChanges(h){
  const el = document.getElementById(h===24?'changes24':'changes48');
  try {
    const data = await j(`./data/changes_${h}h.json`);
    const rows = Array.isArray(data) ? data : (data.changes || []);
    if(!rows.length){
      el.innerHTML='<div class="muted">Noch keine Daten vorhanden.</div>';
      return;
    }
    el.innerHTML = rows.map(r=>`<div class="listrow"><div><strong>${r.station_name}</strong><div class="muted">${r.distance_km} km · ${r.brand||''}</div></div><div style="text-align:right">${['diesel','e5','e10','hvo'].map(f=>{const v=r.change?.[f]; if(v===null||v===undefined) return ''; const cls=Math.abs(v)<0.002?'':' '+(v>0?'bad':'good'); const sign=v>0?'▲':(v<0?'▼':'→'); return `<div class="mono${cls}">${labels[f]} ${sign} ${Math.abs(v).toFixed(3)}€</div>`;}).join('')}</div></div>`).join('');
  } catch(e){
    el.innerHTML = `<div class="muted">Datei changes_${h}h.json konnte nicht geladen werden (${e.status || 'Fehler'}).</div>`;
  }
}

(async function init(){
  try {
    await loadOverview();
  } catch(e){
    console.error(e);
    showBanner('error', '⚠️ Initialisierung fehlgeschlagen', String(e?.message || e));
    document.getElementById('lastUpdate').textContent='Stand: –';
  }
})();
</script>
