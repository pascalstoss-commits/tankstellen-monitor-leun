name: Update fuel data

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Tankerkönig data
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          LOCATION_LAT: ${{ vars.LOCATION_LAT }}
          LOCATION_LNG: ${{ vars.LOCATION_LNG }}
          LOCATION_NAME: ${{ vars.LOCATION_NAME }}
          SEARCH_RADIUS_KM: ${{ vars.SEARCH_RADIUS_KM }}
        run: python fetch_data.py

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          # Nur committen, wenn sich etwas geändert hat
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update fuel data"
          # Aktuellen Stand von main holen und sauber einreihen
          git pull --rebase origin main
          git push origin HEAD:main
