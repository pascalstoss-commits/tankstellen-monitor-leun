name: Update fuel data

on:
  schedule:
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Fetch Tankerkönig data
        continue-on-error: true
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
          LOCATION_LAT: ${{ vars.LOCATION_LAT }}
          LOCATION_LNG: ${{ vars.LOCATION_LNG }}
          LOCATION_NAME: ${{ vars.LOCATION_NAME }}
          SEARCH_RADIUS_KM: ${{ vars.SEARCH_RADIUS_KM }}
        run: |
          python fetch_data.py || (echo "Retry in 30s..." && sleep 30 && python fetch_data.py)

      - name: Commit updated data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update fuel data"
          fi
          git push || echo "::warning::git push failed"

      - name: Disable Jekyll
        if: always()
        run: touch .nojekyll

      - name: Setup Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4
